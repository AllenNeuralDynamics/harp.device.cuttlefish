%YAML 1.1
---
# yaml-language-server: $schema=https://harp-tech.org/draft-02/schema/device.json
device: Cuttlefish
whoAmI: 1403
firmwareVersion: "0.1"
hardwareTargets: "0.0"
registers:
  PinDirection: &IORegister
    address: 32
    type: U8
    access: Write
    maskType: Pins
    description: "Set the direction of the pins. 0 = input; 1 = output"
  PinState:
    <<: *IORegister
    address: 33
    description: "Read or write the state of the pins."
  PinSet:
    <<: *IORegister
    address: 34
    description: "Set pins specified in the mask to logic HIGH by setting the
                 corresponding bit."
  PinClear:
    <<: *IORegister
    address: 35
    description: "Set specified pins in the mask to logic LOW by setting the
                  corresponding bit."
  EnableRisingEdgeEvents:
    <<: *IORegister
    address: 36
    description: "Enable Events from the RisingEdgeEvents register for the
                  specified pins in the mask when any of the the corresponding
                  pins transitions from logic LOW to logic HIGH."
  RisingEdgeEvents:
    <<: *IORegister
    address: 37
    access: Event
    description: "Event Only. Returns a timestamped message with the Port state
                  when any of the pins specified in the EnableRisingEdgeEvents
                  register transitions from logic LOW to logic HIGH."
  EnableFallingEdgeEvents:
    <<: *IORegister
    address: 38
    description: "Enable Events from the FallingEdgeEvents register for the
                  specified pins in the mask when any of the the corresponding
                  pins transitions from logic HIGH to logic LOW."
  FallingEdgeEvents:
    <<: *IORegister
    address: 39
    access: Event
    description: "Event Only. Returns a timestamped message with the Port state
                  when any of the pins specified in the EnableRisingEdgeEvents
                  register transitions from logic HIGH to logic LOW."
  PwmState:
    <<: *IORegister
    address: 40
    access: Write, Event
    description: "Write a nonzero value to this register to start the PWM
                  schedule. Write zero to stop the schedule. Receive an
                  event with payload=0 when the pwm schedule has finished."
  PwmSettings0: &PwmSettingsRegister
    address: 41
    type: U8
    access: Write
    length: 17
    description: "Struct to configure PWM0 settings:
                  offset_us (U32), on_duration_us (U32), off_duration_us (U32),
                  cycles (U32), invert (U8)"
  PwmSettings1:
    <<: *PwmSettingsRegister
    address: 42
    description: "Struct to configure PWM1 settings:
                  offset_us (U32), on_duration_us (U32), off_duration_us (U32),
                  cycles (U32), invert (U8)"
  PwmSettings2:
    <<: *PwmSettingsRegister
    address: 43
    description: "Struct to configure PWM2 settings:
                  offset_us (U32), on_duration_us (U32), off_duration_us (U32),
                  cycles (U32), invert (U8)"
  PwmSettings3:
    <<: *PwmSettingsRegister
    address: 44
    description: "Struct to configure PWM3 settings:
                  offset_us (U32), on_duration_us (U32), off_duration_us (U32),
                  cycles (U32), invert (U8)"
  PwmSettings4:
    <<: *PwmSettingsRegister
    address: 45
    description: "Struct to configure PWM4 settings:
                  offset_us (U32), on_duration_us (U32), off_duration_us (U32),
                  cycles (U32), invert (U8)"
  PwmSettings5:
    <<: *PwmSettingsRegister
    address: 46
    description: "Struct to configure PWM5 settings:
                  offset_us (U32), on_duration_us (U32), off_duration_us (U32),
                  cycles (U32), invert (U8)"
  PwmSettings6:
    <<: *PwmSettingsRegister
    address: 47
    description: "Struct to configure PWM6 settings:
                  offset_us (U32), on_duration_us (U32), off_duration_us (U32),
                  cycles (U32), invert (U8)"
  PwmSettings7:
    <<: *PwmSettingsRegister
    address: 48
    description: "Struct to configure PWM7 settings:
                  offset_us (U32), on_duration_us (U32), off_duration_us (U32),
                  cycles (U32), invert (U8)"

bitMasks:
  Pins:
    description: "Available pins on the device"
    bits:
      None: 0x0
      Pin0: 0x1
      Pin1: 0x2
      Pin2: 0x4
      Pin3: 0x8
      Pin4: 0x10
      Pin5: 0x20
      Pin6: 0x40
      Pin7: 0x80
