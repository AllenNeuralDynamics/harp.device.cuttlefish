%YAML 1.1
---
# yaml-language-server: $schema=https://harp-tech.org/draft-02/schema/device.json
device: Cuttlefish
whoAmI: 1403
firmwareVersion: "0.1"
hardwareTargets: "0.0"
registers:
  PortDirection:
    address: 32
    type: U8
    access: Write
    maskType: Port
    description: "Set the direction of the pins. 0 = input; 1 = output"
  PortState:
    address: 33
    type: U8
    access: Write
    maskType: Port
    description: "Read or write the state of the pins."
  PortSet:
    address: 34
    type: U8
    access: Write
    maskType: Port
    description: "Set pins specified in the mask to logic HIGH by setting the corresponding bit."
  PortClear:
    address: 35
    type: U8
    access: Write
    maskType: Port
    description: "Set specified pins in the mask to logic LOW by setting the corresponding bit."


  EnableRisingEdgeEvents:
    address: 36
    type: U8
    access: Write
    maskType: Port
    description: "Enable Events from the RisingEdgeEvents register for the
                  specified pins in the mask when any of the the corresponding
                  pins transitions from logic LOW to logic HIGH."
  RisingEdgeEvents:
    address: 37
    type: U8
    access: Event
    maskType: Port
    description: "Event Only. Returns a timestamped message with the Port state
                  when any of the pins specified in the EnableRisingEdgeEvents
                  register transitions from logic LOW to logic HIGH."
  EnableFallingEdgeEvents:
    address: 38
    type: U8
    access: Write
    maskType: Port
    description: "Enable Events from the FallingEdgeEvents register for the
                  specified pins in the mask when any of the the corresponding
                  pins transitions from logic HIGH to logic LOW."
  FallingEdgeEvents:
    address: 39
    type: U8
    access: Event
    maskType: Port
    description: "Event Only. Returns a timestamped message with the Port state
                  when any of the pins specified in the EnableRisingEdgeEvents
                  register transitions from logic HIGH to logic LOW."


  PWMStart:
    address: 40
    type: U8
    access: Write
    maskType: Port
    description: "Start the associated PWM channel for the pins specified in
                  the mask."
  PWMStop:
    address: 41
    type: U8
    access: Write
    maskType: Port
    description: "Stop the associated PWM channel for the pins specified in
                  the mask."


  PWMSettings0:
    address: 42
    type: U8
    access: Write
    length: 17
    description: "Struct to configure PWM0 settings:
                  offset_us (U32), on_duration_us (U32), off_duration_us (U32),
                  cycles (U32), invert (U8)"
  PWMSettings1:
    address: 42
    type: U8
    access: Write
    length: 17
    description: "Struct to configure PWM1 settings:
                  offset_us (U32), on_duration_us (U32), off_duration_us (U32),
                  cycles (U32), invert (U8)"
  PWMSettings2:
    address: 42
    type: U8
    access: Write
    length: 17
    description: "Struct to configure PWM2 settings:
                  offset_us (U32), on_duration_us (U32), off_duration_us (U32),
                  cycles (U32), invert (U8)"
  PWMSettings3:
    address: 42
    type: U8
    access: Write
    length: 17
    description: "Struct to configure PWM3 settings:
                  offset_us (U32), on_duration_us (U32), off_duration_us (U32),
                  cycles (U32), invert (U8)"
  PWMSettings4:
    address: 42
    type: U8
    access: Write
    length: 17
    description: "Struct to configure PWM4 settings:
                  offset_us (U32), on_duration_us (U32), off_duration_us (U32),
                  cycles (U32), invert (U8)"
  PWMSettings5:
    address: 42
    type: U8
    access: Write
    length: 17
    description: "Struct to configure PWM5 settings:
                  offset_us (U32), on_duration_us (U32), off_duration_us (U32),
                  cycles (U32), invert (U8)"
  PWMSettings6:
    address: 42
    type: U8
    access: Write
    length: 17
    description: "Struct to configure PWM6 settings:
                  offset_us (U32), on_duration_us (U32), off_duration_us (U32),
                  cycles (U32), invert (U8)"
  PWMSettings7:
    address: 42
    type: U8
    access: Write
    length: 17
    description: "Struct to configure PWM7 settings:
                  offset_us (U32), on_duration_us (U32), off_duration_us (U32),
                  cycles (U32), invert (U8)"


bitMasks:
  Port:
    description: "Available pins on the device"
    bits:
      None: 0x0
      Pin0: 0x1
      Pin1: 0x2
      Pin2: 0x4
      Pin3: 0x8
      Pin4: 0x10
      Pin5: 0x20
      Pin6: 0x40
      Pin7: 0x80
